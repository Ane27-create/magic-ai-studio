<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Magic AI Studio</title>
<style>
    * { box-sizing: border-box; }
    body { margin: 0; background: #050508; color: #fff; font-family: 'Segoe UI', system-ui, sans-serif; }
    .app { max-width: 500px; margin: auto; padding: 20px; }
    .logo { font-size: 26px; font-weight: 800; margin-bottom: 25px; text-align: center; }
    .logo span { background: linear-gradient(90deg, #8b5cf6, #ec4899); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .card { background: #0d0d16; border: 1px solid #1f1f2e; border-radius: 20px; padding: 20px; margin-bottom: 15px; }
    label { display: block; font-size: 12px; font-weight: 700; color: #888; margin-bottom: 8px; text-transform: uppercase; }
    textarea, select, input[type="file"] { width: 100%; padding: 15px; border-radius: 15px; border: 1px solid #2d2d40; background: #151520; color: #fff; font: inherit; margin-bottom: 15px; }
    .btn { width: 100%; padding: 16px; border: 0; border-radius: 15px; background: linear-gradient(90deg, #8b5cf6, #ec4899); color: white; font-weight: 800; cursor: pointer; transition: transform 0.2s; }
    .btn.secondary { background: #2d2d40; margin-top: 0; }
    .btn:active { transform: scale(0.98); }
    .stage { min-height: 300px; display: flex; align-items: center; justify-content: center; background: #0a0a12; border-radius: 20px; overflow: hidden; text-align: center; color: #444; border: 1px solid #1f1f2e; }
    .stage img { max-width: 100%; }
    .spin { width: 40px; height: 40px; border: 4px solid #202031; border-top-color: #8b5cf6; border-radius: 50%; animation: s .8s linear infinite; margin: auto; }
    @keyframes s { to { transform: rotate(360deg); } }
    .error { color: #ff8080; font-size: 14px; text-align: center; margin-top: 10px; }
    .hidden { display: none !important; }
</style>
</head>
<body>
<div class="app">
    <div class="logo">✨ <span>Magic AI Studio</span></div>
    
    <!-- Sección de Generación -->
    <div class="card">
        <label>Generar desde cero</label>
        <textarea id="prompt" placeholder="Ej: Un astronauta en Marte..."></textarea>
        <select id="size">
            <option value="1024,1024">Cuadrado (1:1)</option>
            <option value="768,1024">Vertical (3:4)</option>
        </select>
        <button class="btn" id="gen">✨ Generar imagen</button>
    </div>

    <!-- Sección de Edición -->
    <div class="card">
        <label>Editar imagen existente</label>
        <input type="file" id="file" accept="image/*">
        <textarea id="instr" placeholder="Ej: Cambia el fondo a color violeta..."></textarea>
        <button class="btn secondary" id="edit">🪄 Editar imagen</button>
    </div>

    <div class="stage" id="stage">Tu imagen aparecerá aquí</div>
    <div id="err" class="error hidden"></div>
</div>

<script>
    const $ = s => document.querySelector(s),
          err = $("#err"), stage = $("#stage"),
          API_URL = "https://magic-ai-studio.anedilone27.workers.dev";

    function load(t) {
        err.classList.add("hidden");
        stage.innerHTML = `<div><div class="spin"></div><p style="margin-top:15px; color:#aaa; font-size:14px">${t}</p></div>`;
    }

    async function sendRequest(path, options) {
        const c = new AbortController(), timer = setTimeout(() => c.abort(), 300000);
        try {
            const r = await fetch(API_URL + path, { ...options, signal: c.signal });
            if (!r.ok) throw Error("Error del servidor.");
            return await r.blob();
        } catch (e) {
            throw Error(e.name === "AbortError" ? "Tiempo de espera agotado." : e.message);
        } finally { clearTimeout(timer); }
    }

    $("#gen").onclick = async () => {
        const p = $("#prompt").value.trim();
        if (!p) return alert("Escribe una descripción.");
        let [width, height] = $("#size").value.split(",").map(Number);
        load("Generando...");
        try {
            const b = await sendRequest("/generate", { method: "POST", headers: {"Content-Type":"application/json"}, body: JSON.stringify({prompt:p,width,height}) });
            stage.innerHTML = `<img src="${URL.createObjectURL(b)}">`;
        } catch(e) { err.textContent = e.message; err.classList.remove("hidden"); stage.textContent = "Error."; }
    };

    $("#edit").onclick = async () => {
        const file = $("#file").files[0], instr = $("#instr").value.trim();
        if (!file || !instr) return alert("Sube una imagen y escribe qué cambiar.");
        load("Editando...");
        const fd = new FormData();
        fd.append("image", file);
        fd.append("prompt", instr);
        try {
            const b = await sendRequest("/edit", { method: "POST", body: fd });
            stage.innerHTML = `<img src="${URL.createObjectURL(b)}">`;
        } catch(e) { err.textContent = e.message; err.classList.remove("hidden"); stage.textContent = "Error."; }
    };
</script>
</body>
</html>
