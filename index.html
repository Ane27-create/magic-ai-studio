<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Magic AI Editor</title><style>body{margin:0;background:#111;color:#fff;font-family:Arial;display:flex;justify-content:center}.card{max-width:720px;width:100%;margin:30px;padding:24px;background:#1d1d2e;border-radius:16px}.drop{border:2px dashed #8b5cf6;padding:30px;text-align:center;cursor:pointer}img{max-width:100%;display:none;margin-top:12px}textarea,button{width:100%;margin-top:12px;padding:12px}#loader{display:none}</style></head><body><div class=card><h1>Magic AI Editor</h1><input id=file type=file hidden accept=image/*><div class=drop onclick='file.click()'>📷 Seleccionar imagen</div><img id=preview><textarea id=prompt placeholder='Describe la edición'></textarea><button onclick='editImage()'>✨ Editar imagen</button><div id=loader>Procesando...</div></div><script>file.onchange=e=>{let f=e.target.files[0];if(!f)return;let r=new FileReader();r.onload=()=>{preview.src=r.result;preview.style.display='block'};r.readAsDataURL(f)};async function editImage(){let f=file.files[0],p=prompt.value.trim();if(!f||!p){alert('Falta imagen o descripción');return;}loader.style.display='block';let fd=new FormData();fd.append('image',f);fd.append('prompt',p);try{let res=await fetch('https://magic-ai-studio.anedilone27.workers.dev/generate',{method:'POST',body:fd});if(!res.ok)throw new Error(await res.text());let b=await res.blob();preview.src=URL.createObjectURL(b);preview.style.display='block';}catch(e){alert(e.message)}loader.style.display='none';}</script></body></html>
