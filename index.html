<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Magic AI Studio</title>
<style>
    * { box-sizing: border-box; }
    body { margin: 0; background: #050508; color: #fff; font-family: 'Segoe UI', system-ui, sans-serif; }
    .app { max-width: 500px; margin: auto; padding: 20px; }
    .logo { font-size: 26px; font-weight: 800; margin-bottom: 25px; text-align: center; }
    .logo span { background: linear-gradient(90deg, #8b5cf6, #ec4899); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .card { background: #0d0d16; border: 1px solid #1f1f2e; border-radius: 20px; padding: 20px; margin-bottom: 15px; }
    textarea { width: 100%; padding: 15px; border-radius: 15px; border: 1px solid #2d2d40; background: #151520; color: #fff; font: inherit; margin-bottom: 10px; min-height: 100px; }
    .controls { display: flex; gap: 10px; }
    .btn { flex: 1; padding: 16px; border: 0; border-radius: 15px; background: linear-gradient(90deg, #8b5cf6, #ec4899); color: white; font-weight: 800; cursor: pointer; }
    .btn.secondary { background: #2d2d40; flex: 0; }
    .stage { min-height: 300px; display: flex; align-items: center; justify-content: center; background: #0a0a12; border-radius: 20px; border: 1px solid #1f1f2e; color: #444; margin-bottom: 15px; overflow: hidden; }
    .stage img { max-width: 100%; }
    .error { color: #ff8080; text-align: center; margin-bottom: 10px; }
    .hidden { display: none !important; }
</style>
</head>
<body>
<div class="app">
    <div class="logo">✨ <span>Magic AI Studio</span></div>
    
    <div class="card">
        <textarea id="prompt" placeholder="Describe tu imagen o la edición que deseas..."></textarea>
        <div class="controls">
            <input type="file" id="file" accept="image/*" style="display:none" onchange="this.nextElementSibling.style.background='#4f46e5'">
            <button class="btn secondary" onclick="document.getElementById('file').click()">📎</button>
            <button class="btn" id="gen">✨ Enviar</button>
        </div>
    </div>

    <div class="stage" id="stage">Tu imagen aparecerá aquí</div>
    <div id="err" class="error hidden"></div>
</div>

<script>
    const $ = s => document.querySelector(s), API_URL = "https://magic-ai-studio.anedilone27.workers.dev";
    
    $("#gen").onclick = async () => {
        const p = $("#prompt").value.trim(), file = $("#file").files[0];
        if (!p) return alert("Escribe una descripción.");
        
        $("#stage").innerHTML = "Procesando...";
        let b;
        try {
            if (file) {
                const fd = new FormData();
                fd.append("image", file);
                fd.append("prompt", p);
                const r = await fetch(API_URL, { method: "POST", body: fd });
                b = await r.blob();
            } else {
                const r = await fetch(API_URL, { method: "POST", headers:{"Content-Type":"application/json"}, body: JSON.stringify({prompt:p, width:1024, height:1024}) });
                b = await r.blob();
            }
            $("#stage").innerHTML = `<img src="${URL.createObjectURL(b)}">`;
        } catch(e) { $("#err").textContent = "Error al procesar."; $("#err").classList.remove("hidden"); }
    };
</script>
</body>
</html>
